theme = "autumn"

[keys.normal]
0 = "goto_line_start"
G = "goto_file_end"
"$" = "goto_line_end"

[keys.insert]
"," = { "," = "normal_mode" }
C-p = "signature_help"

[editor]
cursorline = true
line-number = "relative"
end-of-line-diagnostics = "hint"

[editor.lsp]
auto-signature-help = false
