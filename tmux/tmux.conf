
# 256 color terminal with true-color support
set-option -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",*:Tc"

# turn on mouse
set -g mouse on

set-option -g base-index 1
set-option -g pane-base-index 1
set-option -g renumber-windows on
set-option -g allow-rename on
# set-option -g pane-border-status top
set-option -g pane-border-format " #{page_index} #{pane_current_command} "

# Control-b takes my to the last window
bind-key C-b last-window
bind b send-prefix

## Copy/Paste ##
unbind P
bind P paste-buffer

# Pane management
unbind %
bind | split-window -h -c '#{pane_current_path}'
unbind -
bind - split-window -v -c '#{pane_current_path}'
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# Status bar - OneHalfDark inspired
set-option -g status-style "bg=#282c34,fg=#abb2bf"
set-option -g status-justify left
set-option -g status-interval 5
set-option -g status-left-length 40
set-option -g status-left "#[bg=#61afef,fg=#282c34,bold] #S #[bg=#282c34,fg=#61afef]"
set-option -g status-right-length 60
set-option -g status-right "#[bg=#282c34,fg=#98c379]#[bg=#98c379,fg=#282c34] #(git branch 2>/dev/null | sed 's/* //') #[bg=#282c34,fg=#e5c07b]#[bg=#e5c07b,fg=#282c34] %H:%M %m-%d "

# Windows
set-option -g window-status-format "#[bg=#3b4048,fg=#abb2bf]#[bg=#3b4048,fg=#abb2bf] #I:#W #[bg=#282c34,fg=#3b4048]"
set-option -g window-status-current-format "#[bg=#e5c07b,fg=#282c34,bold]#[bg=#e5c07b,fg=#282c34] #I:#W #[bg=#282c34,fg=#e5c07b]"
set-option -g window-status-separator ""

# Pane borders
set-option -g pane-active-border-style "fg=#e5c07b"
set-option -g pane-border-style "fg=#3b4048"

# Messages
set-option -g message-style "bg=#3b4048,fg=#abb2bf"
set-option -g message-command-style "bg=#3b4048,fg=#abb2bf"

# Clock
set-option -g clock-mode-colour "#61afef"

# Source the tmux.conf file
bind R source-file ~/.config/tmux/tmux.conf \; display-message "  Config reloaded..."

# Smart pane switching with awareness of vim splits
bind -n C-h run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)g?(view|n?vim?)(diff)?$' && tmux send-keys C-h) || tmux select-pane -L"
bind -n C-j run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)g?(view|n?vim?)(diff)?$' && tmux send-keys C-j) || tmux select-pane -D"
bind -n C-k run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)g?(view|n?vim?)(diff)?$' && tmux send-keys C-k) || tmux select-pane -U"
bind -n C-l run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)g?(view|n?vim?)(diff)?$' && tmux send-keys C-l) || tmux select-pane -R"
bind -n C-\\ run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)g?(view|n?vim?)(diff)?$' && tmux send-keys 'C-\\') || tmux select-pane -l"

